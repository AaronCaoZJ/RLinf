defaults:
  - env/libero_goal@env.train
  - env/libero_goal@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_goal_ppo_openpi"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  eval_policy_path: null # Optional: .pt file or None, if None, will use the checkpoint in rollout.model.model_path
  val_check_interval: -1
  save_interval: 40

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  reward_coef: 1.0
  group_size: 1
  rollout_epoch: 8
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 4
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean" 
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  # params for generation
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  # Override the default values in env/libero_goal
  train:
    total_num_envs: 64
    max_episode_steps: 320 # max episode steps for truncation
    max_steps_per_rollout_epoch: 320
  eval:
    total_num_envs: 100
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 320
    max_steps_per_rollout_epoch: 1600
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1

  model:
    # model_path: "/home/hdh/github_projects/RLinf/Models/lerobot/pi0_base"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260106-15:02:58/test_openpi/checkpoints/global_step_40/actor/model"

    model_path: "/home/hdh/github_projects/RLinf/Models/rlinf/RLinf-Pi0-LIBERO-Spatial-Object-Goal-SFT"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260106-13:50:11/test_openpi/checkpoints/global_step_40/actor/model"
    # model_path: "/home/hdh/github_projects/RLinf/logs/SFT/20260106-16:27:16/test_openpi/checkpoints/global_step_100/actor/model"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260107-15:07:12/test_openpi/checkpoints/global_step_150/actor/model"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260107-23:19:51/test_openpi/checkpoints/global_step_200/actor/model"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048 # maximum : global batch size = micro batch size * actor num_processes.
  seed: 42
  enable_offload: False

  # Override the default values in model/pi0
  model:
    # model_path: "/home/hdh/github_projects/RLinf/Models/lerobot/pi0_base"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260106-15:02:58/test_openpi/checkpoints/global_step_40/actor/model"

    model_path: "/home/hdh/github_projects/RLinf/Models/rlinf/RLinf-Pi0-LIBERO-Spatial-Object-Goal-SFT"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260106-13:50:11/test_openpi/checkpoints/global_step_40/actor/model"
    # model_path: "/home/hdh/github_projects/RLinf/logs/SFT/20260106-16:27:16/test_openpi/checkpoints/global_step_100/actor/model"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260107-15:07:12/test_openpi/checkpoints/global_step_150/actor/model"
    # model_path: "/home/hdh/github_projects/RLinf/logs/20260107-23:19:51/test_openpi/checkpoints/global_step_200/actor/model"
    num_action_chunks: 4 # interface for the env
    add_value_head: True
    # openpi specific parameters
    openpi:
      detach_critic_input: True

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False